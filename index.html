<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>रोह पंचायत - Ultimate Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{
font-family:'Mukta',sans-serif;
background: linear-gradient(135deg,#020617,#1e3a8a,#2563eb);
color:white;
overflow-x:hidden;
}

.page{display:none;animation:fadeIn .6s ease;}
.active{display:block;}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.nav{
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

.btn{
background:linear-gradient(to right,#facc15,#f59e0b);
color:black;
padding:12px 25px;
border-radius:12px;
font-weight:bold;
transition:.3s;
}
.btn:hover{transform:scale(1.05);}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
}

.glow{
color:#facc15;
text-shadow:0 0 20px rgba(250,204,21,0.7);
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav p-4 flex justify-between">
<h1 class="font-bold">🚀 रोह पंचायत</h1>
<div class="space-x-4">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('gallery')">Gallery</button>
<button onclick="showPage('feedback')">Feedback</button>
</div>
</div>

<!-- HOME -->
<section id="home" class="page active text-center p-10">
<h1 class="text-5xl font-extrabold glow">विपेन्द्र प्रसाद सिन्हा</h1>
<p id="shayari" class="mt-4">लोड हो रहा है...</p>
<p id="event"></p>

<button onclick="vote()" class="btn mt-6">Support 👍</button>
<p id="voteCount" class="mt-2"></p>
</section>

<!-- GALLERY -->
<section id="gallery" class="page p-10">
<h2 class="text-3xl mb-4">📸 Gallery</h2>
<div id="galleryBox" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
</section>

<!-- FEEDBACK -->
<section id="feedback" class="page p-10 text-center">
<h2 class="text-3xl">📝 Feedback</h2>
<textarea id="msg" class="w-full text-black p-3 mt-4" placeholder="Message"></textarea>
<button onclick="sendFeedback()" class="btn mt-4">Send</button>
</section>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const config={
apiKey:"AIzaSyC7RoapoxY0nDoSsfa5mUGzEbaKFLmDQ4Y",
databaseURL:"https://rohpanchayat-default-rtdb.firebaseio.com"
};

const app=initializeApp(config);
const db=getDatabase(app);

// content
onValue(ref(db,'content/'),(s)=>{
let d=s.val()||{};
document.getElementById('shayari').innerText=d.shayari||"स्वागत है";
document.getElementById('event').innerText=d.event||"";
});

// gallery
onValue(ref(db,'gallery/'),(s)=>{
let d=s.val();
let box=document.getElementById('galleryBox');
box.innerHTML="";
if(!d)return;
Object.values(d).forEach(img=>{
box.innerHTML+=`<img src="${img}" class="rounded">`;
});
});

// feedback
window.sendFeedback=()=>{
let msg=document.getElementById('msg').value;
if(!msg)return alert("लिखो पहले");
push(ref(db,'feedback/'),{msg});
alert("भेज दिया ✅");
}

// voting
const voteRef=ref(db,"votes/count");
const userId=localStorage.getItem("uid")||("u"+Math.random());
localStorage.setItem("uid",userId);

onValue(voteRef,(s)=>{
document.getElementById("voteCount").innerText="Total: "+(s.val()||0);
});

window.vote=async()=>{
let userRef=ref(db,"votes/users/"+userId);
let snap=await get(userRef);
if(snap.exists()) return alert("Already voted");

await runTransaction(voteRef,(c)=>(c||0)+1);
await set(userRef,true);
alert("Vote done 👍");
}
</script>

<script>
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
